name: Deploy to IONOS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: 87.106.67.188
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            set -x
            exec > >(tee -a /var/log/toolkit-deploy.log) 2>&1

            trap 'echo "[trap] script exiting with code $? at $(date -Iseconds)"' EXIT
            trap 'echo "[trap] received SIGTERM at $(date -Iseconds)"' TERM
            trap 'echo "[trap] received SIGHUP at $(date -Iseconds)"' HUP

            cd /root/data-cleaning-toolkit

            # fetch and stage code
            echo "=== Fetching code ==="
            echo "[checkpoint] PID=$$ PPID=$PPID date=$(date -Iseconds)"
            git fetch origin main
            CHANGED_FILES=$(git diff HEAD origin/main --name-only)
            git reset --hard origin/main
            git submodule update --init --recursive

            # install vcpkg dependencies (idempotent, cached by vcpkg)
            echo "=== Installing dependencies ==="
            echo "[checkpoint] PID=$$ PPID=$PPID date=$(date -Iseconds)"
            ./vcpkg/vcpkg install --x-manifest-root=. --x-install-root=./vcpkg_installed

            # decide if rebuild is needed
            BINARY_PATH="/root/data-cleaning-toolkit/backend/build/Toolkit"
            NEEDS_REBUILD=false

            if [ ! -f "$BINARY_PATH" ]; then
              echo "binary missing, rebuild required"
              NEEDS_REBUILD=true
            elif echo "$CHANGED_FILES" | grep -qE '(backend/src/|backend/include/|backend/CMakeLists)'; then
              echo "backend files changed, rebuild required"
              NEEDS_REBUILD=true
            fi

            # rebuild if needed
            if [ "$NEEDS_REBUILD" = true ]; then
              echo "=== Building ==="
              echo "[checkpoint] PID=$$ PPID=$PPID date=$(date -Iseconds)"
              cd /root/data-cleaning-toolkit/backend
              rm -rf build && mkdir -p build && cd build
              cmake .. -DCMAKE_TOOLCHAIN_FILE=../../vcpkg/scripts/buildsystems/vcpkg.cmake
              make -j$(nproc)
              if [ ! -f Toolkit ]; then
                echo "ERROR: build failed, Toolkit binary not created"
                exit 1
              fi
              echo "build complete"
            else
              echo "no rebuild needed, restarting existing binary"
            fi

            # stop existing toolkit process
            echo "=== Stopping existing process ==="
            echo "[stopping:start] $(date -Iseconds)"
            if [ -f /var/run/toolkit.pid ]; then
              echo "[stopping:pidfile-exists] reading PID file"
              OLD_PID=$(cat /var/run/toolkit.pid)
              echo "[stopping:old-pid] $OLD_PID"
              if kill -0 "$OLD_PID" 2>/dev/null; then
                echo "[stopping:process-alive] attempting graceful kill"
                kill "$OLD_PID" || echo "[stopping:kill-exit] $?"
                sleep 1
                if kill -0 "$OLD_PID" 2>/dev/null; then
                  echo "[stopping:process-still-alive] attempting -9"
                  kill -9 "$OLD_PID" || echo "[stopping:kill-9-exit] $?"
                  sleep 1
                fi
              else
                echo "[stopping:process-dead] PID $OLD_PID not found"
              fi
              echo "[stopping:removing-pidfile]"
              rm -f /var/run/toolkit.pid
            else
              echo "[stopping:no-pidfile] skipping PID-based kill"
            fi
            echo "[stopping:before-pkill] $(date -Iseconds)"
            pkill -f "/root/data-cleaning-toolkit/backend/build/Toolkit" || echo "[stopping:pkill-exit] $?"
            echo "[stopping:after-pkill] $(date -Iseconds)"
            echo "[stopping:end] $(date -Iseconds)"

            # start new binary
            echo "=== Starting Toolkit ==="
            echo "[checkpoint] PID=$$ PPID=$PPID date=$(date -Iseconds)"
            cd /root/data-cleaning-toolkit/backend/build
            # must launch from backend/build so getFrontendDir() resolves ../../frontend correctly
            nohup ./Toolkit >/var/log/toolkit.log 2>&1 &
            echo $! > /var/run/toolkit.pid
            sleep 3

            # verify server is responding
            echo "=== Verifying server ==="
            echo "[checkpoint] PID=$$ PPID=$PPID date=$(date -Iseconds)"
            echo "[verify:before-curl] $(date -Iseconds)"
            ps auxf | grep -i toolkit | grep -v grep || true
            netstat -tlnp 2>/dev/null | grep :8080 || ss -tlnp 2>/dev/null | grep :8080 || echo "[verify:no-listener] port 8080 not listening"
            if curl -fsS http://localhost:8080/ > /dev/null 2>&1; then
              echo "deployment successful, server responding"
            else
              echo "ERROR: server not responding after startup"
              echo "--- last 20 lines of toolkit.log ---"
              tail -n 20 /var/log/toolkit.log 2>/dev/null || echo "(no log file)"
              exit 1
            fi
