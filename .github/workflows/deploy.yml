name: Deploy to IONOS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: 87.106.67.188
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /root/data-cleaning-toolkit
            git fetch origin ${{ github.ref_name }}
            CHANGED_FILES=$(git diff HEAD origin/${{ github.ref_name }} --name-only)
            git reset --hard origin/${{ github.ref_name }}
            if echo "$CHANGED_FILES" | grep -qE '(src/|include/|CMakeLists)'; then
              if command -v apt-get >/dev/null 2>&1; then apt-get update -qq >/dev/null 2>&1 && apt-get install -y asio-dev >/dev/null 2>&1 || true; fi
              if command -v yum >/dev/null 2>&1; then yum install -y asio-devel >/dev/null 2>&1 || true; fi
              pkill -9 Toolkit || true
              sleep 2
              rm -rf build && mkdir -p build && cd build
              cmake .. >/dev/null
              make -j8 >/dev/null
              [ -f Toolkit ] || (echo "Build failed" && exit 1)
              nohup ./Toolkit >/var/log/toolkit.log 2>&1 &
            else
              pkill -9 Toolkit || true
              sleep 2
              cd /root/data-cleaning-toolkit/build
              nohup ./Toolkit >/var/log/toolkit.log 2>&1 &
            fi
