name: Deploy to IONOS

on:
  push:
    branches: [ main, controlled-refactor ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: 87.106.67.188
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e && \
            apt-get update -qq && apt-get install -y asio-dev >/dev/null 2>&1 && \
            cd /root/data-cleaning-toolkit && \
            git fetch origin main && \
            git reset --hard origin/main && \
            rm -rf build && mkdir -p build && cd build && \
            cmake .. && make -j4 && \
            [ -f Toolkit ] || (echo "Build failed" && exit 1) && \
            pkill -9 Toolkit || true && \
            sleep 5 && \
            cd /root && \
            ./data-cleaning-toolkit/build/Toolkit >/var/log/toolkit.log 2>&1 &
