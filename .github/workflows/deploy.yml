name: Deploy to IONOS

on:
  push:
    branches: [ main, controlled-refactor ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: 87.106.67.188
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          timeout: 60s
          command_timeout: 30s
          script: |
            pkill -f "cd /root" || true
            nohup bash -c 'cd /root/data-cleaning-toolkit && git pull origin main && pkill -f Toolkit || true && cd build && cmake .. -DCMAKE_TOOLCHAIN_FILE="../vcpkg/scripts/buildsystems/vcpkg.cmake" -DCMAKE_BUILD_TYPE=Release && make -j1 && pkill -f Toolkit || true && nohup ./Toolkit > /tmp/toolkit.log 2>&1 &' > /tmp/deploy.log 2>&1 &
            sleep 1
