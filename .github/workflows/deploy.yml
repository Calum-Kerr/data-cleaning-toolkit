name: Deploy to IONOS

on:
  push:
    branches: [ main, controlled-refactor ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: 87.106.67.188
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            if command -v apt-get >/dev/null 2>&1; then apt-get update -qq >/dev/null 2>&1 && apt-get install -y asio-dev >/dev/null 2>&1 || true; fi && \
            if command -v yum >/dev/null 2>&1; then yum install -y asio-devel >/dev/null 2>&1 || true; fi && \
            cd /root/data-cleaning-toolkit && \
            git fetch origin main && \
            git reset --hard origin/main && \
            rm -rf build && mkdir -p build && cd build && \
            cmake .. >/dev/null && \
            make -j4 >/dev/null && \
            [ -f Toolkit ] || (echo "Build failed" && exit 1) && \
            cd /root/data-cleaning-toolkit && \
            nohup ./build/Toolkit >/var/log/toolkit.log 2>&1 &
