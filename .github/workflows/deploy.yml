name: Deploy to IONOS

on:
  push:
    branches: [ main, controlled-refactor ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: 87.106.67.188
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /root/data-cleaning-toolkit && \
            git fetch origin main 2>&1 | head -20 && \
            git reset --hard origin/main && \
            rm -rf build && mkdir -p build && cd build && \
            cmake .. 2>&1 | tail -5 && \
            make -j4 2>&1 | tail -10 && \
            echo "Build completed, stopping old process..." && \
            pkill -f "/root/data-cleaning-toolkit/build/Toolkit" || true && \
            sleep 1 && \
            /root/data-cleaning-toolkit/build/Toolkit > /tmp/app.log 2>&1 &
            echo "Process started with PID $!"
