name: Deploy to IONOS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        # v1 (pinned to immutable commit)
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: deploy
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            set -x
            exec > >(tee -a /home/deploy/deploy.log) 2>&1

            echo "================================================================"
            echo "DEPLOY RUN START: $(date -Iseconds) PID=$$"
            echo "================================================================"

            trap 'echo "[trap] script exiting with code $? at $(date -Iseconds)"' EXIT
            trap 'echo "[trap] received SIGTERM at $(date -Iseconds)"' TERM
            trap 'echo "[trap] received SIGHUP at $(date -Iseconds)"' HUP

            cd /opt/toolkit

            # fetch and stage code
            echo "=== Fetching code ==="
            echo "[checkpoint] PID=$$ PPID=$PPID date=$(date -Iseconds)"
            git fetch origin main

            # abort if server has uncommitted changes
            if ! git diff --quiet || ! git diff --cached --quiet; then
              echo "ERROR: Deploy aborted — uncommitted changes on server."
              echo "  unstaged:"
              git diff --stat
              echo "  staged:"
              git diff --cached --stat
              exit 1
            fi

            CHANGED_FILES=$(git diff HEAD origin/main --name-only)
            git reset --hard origin/main
            git submodule update --init --recursive

            # install vcpkg dependencies (idempotent, cached by vcpkg)
            echo "=== Installing dependencies ==="
            echo "[checkpoint] PID=$$ PPID=$PPID date=$(date -Iseconds)"
            ./vcpkg/vcpkg install --x-manifest-root=. --x-install-root=./vcpkg_installed

            # decide if rebuild is needed
            BINARY_PATH="/opt/toolkit/build/Toolkit"
            NEEDS_REBUILD=false

            if [ ! -f "$BINARY_PATH" ]; then
              echo "binary missing, rebuild required"
              NEEDS_REBUILD=true
            elif echo "$CHANGED_FILES" | grep -qE '(backend/src/|backend/include/|backend/CMakeLists)'; then
              echo "backend files changed, rebuild required"
              NEEDS_REBUILD=true
            fi

            # rebuild if needed
            if [ "$NEEDS_REBUILD" = true ]; then
              echo "=== Building ==="
              echo "[checkpoint] PID=$$ PPID=$PPID date=$(date -Iseconds)"
              cd /opt/toolkit
              if [ -f "$BINARY_PATH" ]; then
                cp "$BINARY_PATH" /tmp/toolkit_previous_binary
              fi
              rm -rf build && mkdir -p build && cd build
              cmake ../backend -DCMAKE_TOOLCHAIN_FILE=../vcpkg/scripts/buildsystems/vcpkg.cmake
              make -j$(nproc)
              if [ ! -f Toolkit ]; then
                echo "ERROR: build failed, Toolkit binary not created"
                exit 1
              fi
              echo "build complete"
            else
              echo "no rebuild needed, restarting existing binary"
            fi

            # restart via systemd
            echo "=== Restarting toolkit service ==="
            echo "[checkpoint] PID=$$ PPID=$PPID date=$(date -Iseconds)"
            sudo systemctl restart toolkit.service
            sleep 2

            # verify server is responding
            echo "=== Verifying server ==="
            echo "[checkpoint] PID=$$ PPID=$PPID date=$(date -Iseconds)"
            echo "[verify:before-curl] $(date -Iseconds)"
            ps auxf | grep -i toolkit | grep -v grep || true
            netstat -tlnp 2>/dev/null | grep :8080 || ss -tlnp 2>/dev/null | grep :8080 || echo "[verify:no-listener] port 8080 not listening"
            if curl -fsS http://localhost:8080/ > /dev/null 2>&1; then
              echo "deployment successful, server responding"
              rm -f /tmp/toolkit_previous_binary
            else
              echo "ERROR: server not responding after startup"
              echo "--- last 20 lines of toolkit.log ---"
              tail -n 20 /var/log/toolkit.log 2>/dev/null || echo "(no log file)"
              if [ -f /tmp/toolkit_previous_binary ]; then
                echo "=== Rolling back to previous binary ==="
                mkdir -p /opt/toolkit/build
                cp /tmp/toolkit_previous_binary /opt/toolkit/build/Toolkit
                sudo systemctl restart toolkit.service
                sleep 2
                if curl -fsS http://localhost:8080/ > /dev/null 2>&1; then
                  echo "rollback successful: previous binary restored, server responding"
                else
                  echo "ERROR: rollback did not restore service, server still not responding"
                fi
              else
                echo "no previous binary available, cannot roll back"
              fi
              exit 1
            fi
