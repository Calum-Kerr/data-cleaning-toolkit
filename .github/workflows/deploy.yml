name: Deploy to IONOS

on:
  push:
    branches: [ main, controlled-refactor ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: 87.106.67.188
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          script_stop: true
          script: |
            cd /root/data-cleaning-toolkit
            git pull origin main
            pkill -f Toolkit || true
            cd build && cmake .. -DCMAKE_TOOLCHAIN_FILE="../vcpkg/scripts/buildsystems/vcpkg.cmake" -DCMAKE_BUILD_TYPE=Release && make -j1
            nohup ./Toolkit > /tmp/toolkit.log 2>&1 &
