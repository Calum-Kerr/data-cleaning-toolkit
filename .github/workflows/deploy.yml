name: Deploy to IONOS

on:
  push:
    branches: [ main, controlled-refactor ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: 87.106.67.188
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            apt-get update && apt-get install -y asio-dev 2>&1 | tail -3 && \
            cd /root/data-cleaning-toolkit && \
            git fetch origin main 2>&1 | head -10 && \
            git reset --hard origin/main && \
            rm -rf build && mkdir -p build && cd build && \
            cmake .. && make -j4 && \
            if [ ! -f Toolkit ]; then echo "Build failed"; exit 1; fi && \
            echo "Build complete" && \
            pkill -9 Toolkit || true && \
            sleep 3 && \
            cd /root/data-cleaning-toolkit && \
            ./build/Toolkit > /tmp/app.log 2>&1 &
            PID=$! && \
            sleep 2 && \
            kill -0 $PID && echo "Process $PID running" || echo "Process $PID died"
