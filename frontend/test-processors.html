<!DOCTYPE html>
<html>
<head><title>Processor Test</title><style>body{font-family:monospace;padding:20px;}button{padding:8px 16px;margin:5px;cursor:pointer;}.result{border:1px solid #ccc;padding:10px;margin:10px 0;background:#f9f9f9;}</style></head>
<body><h1>Processor Transformation Test</h1><p>Click a button to test JSON/XML/Text cleaning:</p><button onclick="testJson()">Test JSON Cleaner</button><button onclick="testXml()">Test XML Cleaner</button><button onclick="testText()">Test Text Cleaner</button><div id=result></div>
<script src="js/json-processor.js"></script><script src="js/xml-processor.js"></script><script src="js/text-processor.js"></script><script>
function testJson(){
  const testData=`{"items":[{"name":"  test  "},{"name":"  test  "}]}`;
  const result=document.getElementById('result');
  result.innerHTML='<div class=result><h3>JSON Test</h3><p>Input: '+testData+'</p>';
  try{processJsonData(testData);}catch(e){result.innerHTML+='<p style="color:red;">Error: '+e.message+'</p>';}
}
function testXml(){
  const testData=`<?xml version="1.0"?><root><item>  test  </item></root>`;
  const result=document.getElementById('result');
  result.innerHTML='<div class=result><h3>XML Test</h3><p>Input: '+testData+'</p>';
  try{processXmlData(testData);}catch(e){result.innerHTML+='<p style="color:red;">Error: '+e.message+'</p>';}
}
function testText(){
  const testData=`  line 1  \n\n  line 2  `;
  const result=document.getElementById('result');
  result.innerHTML='<div class=result><h3>Text Test</h3><p>Input (with spaces): line 1, blank line, line 2</p>';
  try{processTextData(testData);}catch(e){result.innerHTML+='<p style="color:red;">Error: '+e.message+'</p>';}
}
</script></body>
</html>
